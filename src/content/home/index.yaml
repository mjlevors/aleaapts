aboutHeading: About A-Lea Apartments
aboutBody: >-
  Like Kwik Trip? The 3 buildings that make up the A Lea Apartments have a
  neighborhood Kwik Trip surrounded. The complex is also just a 5 minute
  drive from anywhere you may need to be in the city due to it's central
  location. On-site laundry and off-street parking. We just updated the
  flooring in our common areas and hallways. Most units, roughly 60 of the
  71 units, have been updated within the last 5-7 years. We do allow
  tenants to have a cat or a dog with management approval, but with
  restrictions, with the size of the dog being one example. Only 1 pet/unit.

