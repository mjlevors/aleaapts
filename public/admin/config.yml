backend:
  name: github
  repo: mjlevors/aleaapts
  branch: astro-native-rebuild

local_backend: true

media_folder: "public/wp-content/uploads/cms"
public_folder: "/wp-content/uploads/cms"

collections:
  - name: "home"
    label: "Homepage"
    files:
      - name: "home"
        label: "Homepage content"
        file: "src/content/home/index.yaml"
        fields:
          - label: "Hero slideshow slides"
            name: "heroSlides"
            widget: "list"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body (optional)", name: "body", widget: "string", required: false }
          - { label: "About heading", name: "aboutHeading", widget: "string" }
          - { label: "About body", name: "aboutBody", widget: "text" }
          - { label: "Call-to-action button label", name: "ctaLabel", widget: "string" }
          - { label: "Call-to-action button URL", name: "ctaUrl", widget: "string" }
          - { label: "Office heading", name: "officeHeading", widget: "string" }
          - label: "Office address/phone lines"
            name: "officeLines"
            widget: "list"
